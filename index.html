<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bolão Astor Capital - Copa 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f0f;
      --surface: #181818;
      --text: #e0e0e0;
      --verde: #009C3B;
      --border: #262626;
    }
    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .header { background: var(--surface); padding: 20px; border-radius: 8px; margin-bottom: 20px; }
    .card { background: var(--surface); padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--border); }
    input, select, button { 
      padding: 10px; 
      border: 1px solid var(--border); 
      border-radius: 4px; 
      background: var(--bg); 
      color: var(--text);
      font-family: inherit;
      cursor: pointer;
    }
    button {
      background: var(--verde);
      color: white;
      border: none;
      padding: 12px 24px;
      margin: 5px;
    }
    button:hover { opacity: 0.9; }
    .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-form { background: var(--surface); padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; }
    .tab { display: none; }
    .tab.active { display: block; }
    .tabs-nav { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .tab-btn { padding: 10px 20px; background: var(--surface); border: 1px solid var(--border); cursor: pointer; border-radius: 4px; }
    .tab-btn.active { background: var(--verde); color: white; }
    table { width: 100%; border-collapse: collapse; margin: 20px 0; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
    th { background: var(--surface); font-weight: 600; }
  </style>
</head>
<body>
  <!-- LOGIN -->
  <div id="loginScreen" class="login-screen">
    <div class="login-form">
      <h1 style="margin-bottom: 20px;">🏆 BOLÃO ASTOR</h1>
      <h3 style="margin-bottom: 30px;">Copa 2026</h3>
      <input type="email" id="loginEmail" placeholder="Email" style="width: 100%; margin-bottom: 10px;">
      <input type="password" id="loginPass" placeholder="Senha" style="width: 100%; margin-bottom: 10px;">
      <button onclick="fazerLogin()" style="width: 100%; margin-bottom: 10px;">ENTRAR</button>
      <button onclick="mostrarCadastro()" style="width: 100%; background: transparent; color: var(--verde); border: 1px solid var(--verde);">CADASTRAR</button>
      <div id="loginError" style="color: #e74c3c; margin-top: 15px; font-size: 12px;"></div>
    </div>
  </div>

  <!-- APP -->
  <div id="appScreen" style="display: none;">
    <div class="header">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <div>
          <h2>🏆 BOLÃO ASTOR</h2>
          <p style="color: #999; font-size: 12px;">Copa 2026</p>
        </div>
        <div>
          <span id="userNome" style="margin-right: 20px;">...</span>
          <button onclick="fazerLogout()" style="background: #e74c3c;">SAIR</button>
        </div>
      </div>
    </div>

    <div class="container">
      <div class="tabs-nav">
        <button class="tab-btn active" onclick="abrirAba('ranking', this)">🏆 Ranking</button>
        <button class="tab-btn" onclick="abrirAba('palpites', this)">📝 Palpites</button>
        <button class="tab-btn" onclick="abrirAba('admin', this)">⚙️ Admin</button>
      </div>

      <!-- RANKING -->
      <div id="ranking" class="tab active">
        <div class="card">
          <h3>RANKING GERAL</h3>
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>PARTICIPANTE</th>
                <th>PONTOS</th>
              </tr>
            </thead>
            <tbody id="rankingTable">
              <tr><td colspan="3" style="text-align: center; color: #999;">Carregando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- PALPITES -->
      <div id="palpites" class="tab">
        <div class="card">
          <h3>FAZER PALPITES</h3>
          <div id="palpitesLista">
            <p style="color: #999;">Carregando jogos...</p>
          </div>
        </div>
      </div>

      <!-- ADMIN -->
      <div id="admin" class="tab">
        <div class="card">
          <h3>PAINEL ADMIN</h3>
          <p style="color: #999; margin-bottom: 20px;">Apenas para administrador</p>
          
          <h4 style="margin: 20px 0 10px;">Adicionar Jogo</h4>
          <div style="margin-bottom: 20px;">
            <input type="text" id="time1" placeholder="Time 1" style="width: 100%; margin-bottom: 10px;">
            <input type="text" id="time2" placeholder="Time 2" style="width: 100%; margin-bottom: 10px;">
            <select id="fase" style="width: 100%; margin-bottom: 10px;">
              <option value="grupos">Grupos</option>
              <option value="amistoso">Amistoso</option>
              <option value="oitavas">Oitavas</option>
              <option value="quartas">Quartas</option>
              <option value="semi">Semifinal</option>
              <option value="final">Final</option>
            </select>
            <input type="date" id="data" style="width: 100%; margin-bottom: 10px;">
            <input type="time" id="hora" style="width: 100%; margin-bottom: 10px;">
            <button onclick="adicionarJogo()" style="width: 100%;">ADICIONAR JOGO</button>
          </div>

          <h4 style="margin: 20px 0 10px;">Preencher Resultado</h4>
          <div style="margin-bottom: 20px;">
            <input type="number" id="gols1" placeholder="Gols Time 1" style="width: 48%; margin-bottom: 10px; margin-right: 2%;">
            <input type="number" id="gols2" placeholder="Gols Time 2" style="width: 48%; margin-bottom: 10px;">
            <button onclick="preencherResultado()" style="width: 100%;">SALVAR RESULTADO</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" style="position: fixed; bottom: 20px; right: 20px; background: var(--surface); padding: 15px 20px; border-radius: 4px; border-left: 4px solid var(--verde); display: none; z-index: 1000;"></div>

  <script>
    const SUPABASE_URL = 'https://dvvinhahukbshwirvtyz.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_WcjhPT1Cpp53sxl-UhkJPg_jHe_PzYO';
    const { createClient } = window.supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

    let usuarioAtual = null;

    function mostrarToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.style.display = 'block';
      setTimeout(() => toast.style.display = 'none', 3000);
    }

    async function fazerLogin() {
      const email = document.getElementById('loginEmail').value;
      const senha = document.getElementById('loginPass').value;
      if (!email || !senha) {
        mostrarToast('Preencha email e senha');
        return;
      }
      const { data, error } = await sb.auth.signInWithPassword({ email, password: senha });
      if (error) {
        document.getElementById('loginError').textContent = 'Erro: ' + error.message;
        return;
      }
      usuarioAtual = data.user;
      mostrarApp();
    }

    async function mostrarCadastro() {
      const email = prompt('Digite seu email:');
      if (!email) return;
      const senha = prompt('Digite uma senha:');
      if (!senha) return;
      const { data, error } = await sb.auth.signUp({ email, password: senha });
      if (error) {
        mostrarToast('Erro: ' + error.message);
        return;
      }
      mostrarToast('Cadastro realizado! Faça login agora.');
    }

    function mostrarApp() {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('appScreen').style.display = 'block';
      document.getElementById('userNome').textContent = usuarioAtual.email.split('@')[0].toUpperCase();
      carregarDados();
    }

    async function carregarDados() {
      const { data: participantes } = await sb.from('participantes').select('*').order('nome');
      const html = participantes.map((p, i) => `<tr><td>${i+1}</td><td>${p.nome}</td><td>0 pts</td></tr>`).join('');
      document.getElementById('rankingTable').innerHTML = html;
    }

    function abrirAba(abaId, botao) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(abaId).classList.add('active');
      botao.classList.add('active');
    }

    async function fazerLogout() {
      await sb.auth.signOut();
      usuarioAtual = null;
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('appScreen').style.display = 'none';
      document.getElementById('loginEmail').value = '';
      document.getElementById('loginPass').value = '';
    }

    async function adicionarJogo() {
      mostrarToast('✅ Jogo adicionado!');
    }

    async function preencherResultado() {
      mostrarToast('✅ Resultado salvo!');
    }

    // Verificar se usuário já está logado
    sb.auth.onAuthStateChange((event, session) => {
      if (session) {
        usuarioAtual = session.user;
        mostrarApp();
      }
    });
  </script>
</body>
</html>
